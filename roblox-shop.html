<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Roblox Games | Boutique de jeux</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1c2a 0%, #232538 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }

    .store-container {
      max-width: 1300px;
      width: 100%;
    }

    /* En-tête */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 0.9rem 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .roblox-icon {
      background: #ff2e4c;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 8px 18px rgba(255, 46, 76, 0.45);
      transform: rotate(2deg);
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #d0d8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cart-panel {
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }

    .cart-icon-wrapper {
      position: relative;
      cursor: pointer;
      background: #2e3142;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.25s;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    .cart-icon-wrapper:hover {
      background: #3c4058;
      border-color: rgba(255,255,255,0.35);
    }

    .cart-emoji {
      font-size: 1.5rem;
      filter: drop-shadow(0 0 5px #ffb347);
    }

    #cart-count {
      background: #ff4d6d;
      color: white;
      font-weight: bold;
      font-size: 0.9rem;
      min-width: 24px;
      height: 24px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      box-shadow: 0 0 12px #ff4d6d;
    }

    .cart-total {
      font-weight: 600;
      background: rgba(0,0,0,0.35);
      padding: 0.3rem 1rem;
      border-radius: 1.5rem;
      color: #ffd966;
    }

    /* Grille de jeux */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    .game-card {
      background: rgba(20, 22, 35, 0.8);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      padding: 1.2rem 1.2rem 1.5rem;
      box-shadow: 0 30px 40px -25px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.08);
      transition: transform 0.25s ease, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .game-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 35px 45px -15px #000000cc, 0 0 0 1px rgba(255,80,100,0.3);
      border-color: rgba(255,70,90,0.5);
    }

    .game-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, #2b2f4a, #1b1e33);
      border-radius: 1.2rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.4rem;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.3), 0 10px 18px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .game-img span {
      filter: drop-shadow(0 8px 10px black);
    }

    .game-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      letter-spacing: -0.3px;
      color: #fff5f0;
    }

    .game-genre {
      color: #a9b3d4;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 2rem;
      padding: 0.5rem 0.8rem 0.5rem 1.2rem;
    }

    .price {
      font-weight: 700;
      font-size: 1.4rem;
      color: #ffd966;
      text-shadow: 0 0 8px #ffaa33;
    }

    .buy-btn {
      background: #ff3b5c;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 0.95rem;
      padding: 0.5rem 1.3rem;
      border-radius: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.2s;
      box-shadow: 0 6px 14px rgba(255, 40, 70, 0.5);
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .buy-btn:hover {
      background: #ff5476;
      box-shadow: 0 8px 18px #ff2e4c;
      transform: scale(1.03);
    }

    .buy-btn:active {
      transform: scale(0.96);
    }

    /* Panier section */
    .cart-details {
      background: rgba(10, 12, 20, 0.8);
      backdrop-filter: blur(24px);
      border-radius: 2.5rem;
      padding: 1.8rem 2rem;
      margin-top: 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 40px -12px black;
    }

    .cart-title {
      font-size: 1.6rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }

    #cart-items-list {
      list-style: none;
      margin-bottom: 1.2rem;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0.8rem;
      background: rgba(255,255,255,0.04);
      border-radius: 1.2rem;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .remove-item {
      background: transparent;
      border: 1px solid #ff7878;
      color: #ffb3b3;
      border-radius: 1.5rem;
      padding: 0.2rem 0.9rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
      transition: 0.2s;
    }

    .remove-item:hover {
      background: #ff3b4a;
      color: white;
      border-color: #ff3b4a;
    }

    .cart-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.8rem;
    }

    .clear-cart-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ddd;
      padding: 0.6rem 1.4rem;
      border-radius: 2.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .clear-cart-btn:hover {
      background: rgba(255, 70, 70, 0.25);
      border-color: #ff5e5e;
      color: white;
    }

    .checkout-btn {
      background: #00b87a;
      border: none;
      color: white;
      font-weight: bold;
      padding: 0.7rem 2rem;
      border-radius: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 8px 18px #00b87a66;
      transition: 0.25s;
    }

    .checkout-btn:hover {
      background: #00d68f;
      box-shadow: 0 10px 22px #00e096;
    }

    .empty-cart-message {
      color: #9a9fb8;
      font-style: italic;
      padding: 0.8rem 0;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        align-items: stretch;
      }
      .cart-panel {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
<div class="store-container">
  
  <!-- En-tête avec panier -->
  <header class="header">
    <div class="logo-area">
      <div class="roblox-icon">R</div>
      <span class="logo-text">Roblox Games</span>
    </div>
    <div class="cart-panel">
      <div class="cart-icon-wrapper" id="cart-toggle">
        <span class="cart-emoji">🛒</span>
        <span id="cart-count">0</span>
        <span class="cart-total" id="cart-total-display">0 Robux</span>
      </div>
    </div>
  </header>

  <!-- Grille de jeux -->
  <div class="games-grid" id="gamesContainer">
    <!-- Les jeux seront générés dynamiquement en JS -->
  </div>

  <!-- Section panier détaillé -->
  <div class="cart-details" id="cartDetailSection">
    <div class="cart-title">
      <span>🧾 Votre panier</span>
    </div>
    <ul id="cart-items-list">
      <li class="empty-cart-message">Votre panier est vide pour le moment.</li>
    </ul>
    <div class="cart-summary">
      <button class="clear-cart-btn" id="clearCartBtn">🗑️ Vider le panier</button>
      <button class="checkout-btn" id="checkoutBtn">💳 Payer <span id="checkout-total">0</span> Robux</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- Base de données de jeux Roblox (simulée) -----
    const games = [
      {
        id: 1,
        title: "Blox Fruits",
        genre: "Aventure · Combat",
        price: 450,
        emoji: "🍈⚔️",
        bgGradient: "linear-gradient(145deg, #16635b, #0b3b3f)"
      },
      {
        id: 2,
        title: "Adopt Me!",
        genre: "Rôle · Animaux",
        price: 300,
        emoji: "🐾🍼",
        bgGradient: "linear-gradient(145deg, #e67e9c, #b54a6b)"
      },
      {
        id: 3,
        title: "Murder Mystery 2",
        genre: "Mystère · Social",
        price: 275,
        emoji: "🔪🕵️",
        bgGradient: "linear-gradient(145deg, #2d2f4b, #1b1d35)"
      },
      {
        id: 4,
        title: "Tower of Hell",
        genre: "Obstacle · Course",
        price: 180,
        emoji: "🏗️⏱️",
        bgGradient: "linear-gradient(145deg, #b14b3c, #732c26)"
      },
      {
        id: 5,
        title: "Jailbreak",
        genre: "Action · Voitures",
        price: 520,
        emoji: "🚔💰",
        bgGradient: "linear-gradient(145deg, #2f4b6e, #1c2b44)"
      },
      {
        id: 6,
        title: "Pet Simulator X",
        genre: "Collection · Animaux",
        price: 390,
        emoji: "💎🐱",
        bgGradient: "linear-gradient(145deg, #9b59b6, #5e337c)"
      }
    ];

    // ----- État du panier -----
    let cart = []; // Stocke les IDs des jeux (ou objets avec id, title, price)

    // ----- Références DOM -----
    const gamesContainer = document.getElementById('gamesContainer');
    const cartCountSpan = document.getElementById('cart-count');
    const cartTotalDisplay = document.getElementById('cart-total-display');
    const cartItemsList = document.getElementById('cart-items-list');
    const clearCartBtn = document.getElementById('clearCartBtn');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const checkoutTotalSpan = document.getElementById('checkout-total');

    // ----- Fonctions d'affichage -----

    // Afficher les jeux dans la grille
    function renderGames() {
      if (!gamesContainer) return;
      gamesContainer.innerHTML = '';

      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.setAttribute('data-game-id', game.id);

        // Image stylisée (emoji + fond)
        const imgDiv = document.createElement('div');
        imgDiv.className = 'game-img';
        imgDiv.style.background = game.bgGradient || 'linear-gradient(135deg, #2b2f4a, #1b1e33)';
        const emojiSpan = document.createElement('span');
        emojiSpan.textContent = game.emoji || '🎮';
        imgDiv.appendChild(emojiSpan);

        // Titre
        const titleEl = document.createElement('h3');
        titleEl.className = 'game-title';
        titleEl.textContent = game.title;

        // Genre
        const genreEl = document.createElement('div');
        genreEl.className = 'game-genre';
        genreEl.innerHTML = `🎯 ${game.genre}`;

        // Prix + bouton
        const priceRow = document.createElement('div');
        priceRow.className = 'price-row';

        const priceSpan = document.createElement('span');
        priceSpan.className = 'price';
        priceSpan.textContent = `${game.price} R$`;

        const buyButton = document.createElement('button');
        buyButton.className = 'buy-btn';
        buyButton.innerHTML = `🛒 Acheter`;
        buyButton.setAttribute('data-id', game.id);
        buyButton.addEventListener('click', (e) => {
          e.stopPropagation();
          addToCart(game.id);
        });

        priceRow.appendChild(priceSpan);
        priceRow.appendChild(buyButton);

        card.appendChild(imgDiv);
        card.appendChild(titleEl);
        card.appendChild(genreEl);
        card.appendChild(priceRow);
        gamesContainer.appendChild(card);
      });
    }

    // Ajouter un jeu au panier
    function addToCart(gameId) {
      const game = games.find(g => g.id === gameId);
      if (!game) return;

      // On stocke un objet simplifié (ou juste l'ID, mais pour facilité on garde titre/prix)
      cart.push({
        id: game.id,
        title: game.title,
        price: game.price
      });

      updateCartUI();
      // Petit retour visuel (optionnel)
      animateCartBadge();
    }

    // Retirer un article du panier par son index dans le tableau cart
    function removeFromCart(index) {
      if (index >= 0 && index < cart.length) {
        cart.splice(index, 1);
        updateCartUI();
      }
    }

    // Vider tout le panier
    function clearCart() {
      if (cart.length === 0) return;
      cart = [];
      updateCartUI();
    }

    // Calculer le total
    function getCartTotal() {
      return cart.reduce((sum, item) => sum + item.price, 0);
    }

    // Mise à jour complète de l'interface panier
    function updateCartUI() {
      const total = getCartTotal();
      const count = cart.length;

      // Badge compteur
      if (cartCountSpan) cartCountSpan.textContent = count;
      if (cartTotalDisplay) cartTotalDisplay.textContent = `${total} Robux`;
      if (checkoutTotalSpan) checkoutTotalSpan.textContent = total;

      // Liste détaillée du panier
      if (cartItemsList) {
        cartItemsList.innerHTML = '';

        if (cart.length === 0) {
          cartItemsList.innerHTML = '<li class="empty-cart-message">🛒 Votre panier est vide pour le moment.</li>';
        } else {
          cart.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'cart-item';
            li.innerHTML = `
              <span>🎮 ${item.title} <span style="color:#ffd966; margin-left:0.5rem;">${item.price} R$</span></span>
              <button class="remove-item" data-index="${index}">✕ Retirer</button>
            `;
            // Attacher l'événement de suppression
            const removeBtn = li.querySelector('.remove-item');
            if (removeBtn) {
              removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(removeBtn.getAttribute('data-index'), 10);
                removeFromCart(idx);
              });
            }
            cartItemsList.appendChild(li);
          });
        }
      }
    }

    // Petite animation sur le badge
    function animateCartBadge() {
      if (!cartCountSpan) return;
      cartCountSpan.style.transform = 'scale(1.3)';
      setTimeout(() => {
        if (cartCountSpan) cartCountSpan.style.transform = 'scale(1)';
      }, 180);
    }

    // Simuler le paiement (checkout)
    function proceedToCheckout() {
      if (cart.length === 0) {
        alert("🛑 Votre panier est vide. Ajoutez des jeux Roblox avant de payer.");
        return;
      }
      const total = getCartTotal();
      const gameList = cart.map(item => item.title).join(', ');
      alert(`✅ Simulation d'achat réussie !\n\n📦 Jeux : ${gameList}\n💰 Total : ${total} Robux\n\n(Transaction fictive – aucun vrai achat.)`);
      // Vider le panier après achat (simulé)
      clearCart();
    }

    // ----- Écouteurs d'événements globaux -----
    clearCartBtn.addEventListener('click', () => {
      if (cart.length === 0) {
        alert("Le panier est déjà vide.");
        return;
      }
      clearCart();
    });

    checkoutBtn.addEventListener('click', proceedToCheckout);

    // Pour le toggle panier (optionnel : focus sur la section)
    document.getElementById('cart-toggle').addEventListener('click', () => {
      document.getElementById('cartDetailSection').scrollIntoView({ behavior: 'smooth' });
    });

    // ----- Initialisation -----
    renderGames();
    updateCartUI(); // panier vide au départ

    // (Bonus) Ajouter un style pour l'animation du badge
    const styleEl = document.createElement('style');
    styleEl.textContent = `
      #cart-count {
        transition: transform 0.2s ease;
      }
      .cart-item {
        transition: background 0.2s;
      }
      .cart-item:hover {
        background: rgba(255,255,255,0.08);
      }
    `;
    document.head.appendChild(styleEl);
  })();
</script>
</body>
</html>
